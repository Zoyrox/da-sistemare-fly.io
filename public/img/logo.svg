<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <!-- MotoStaffa Logo -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Motorcycle Icon -->
  <g transform="translate(10, 10)">
    <!-- Wheels -->
    <circle cx="10" cy="22" r="8" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    <circle cx="38" cy="22" r="8" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    
    <!-- Frame -->
    <path d="M10 22 L20 10 L32 10 L38 22" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 10 L18 22" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
    <path d="M32 10 L30 6" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Handlebar -->
    <path d="M28 6 L36 8" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Seat -->
    <path d="M18 10 L28 10" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text: MotoStaffa -->
  <text x="65" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">
    Moto<tspan fill="url(#grad1)">Staffa</tspan>
  </text>
  
  <!-- Subtitle: Office -->
  <text x="65" y="44" font-family="Arial, sans-serif" font-size="10" fill="#a1a1aa" letter-spacing="2">
    OFFICE
  </text>
</svg>
