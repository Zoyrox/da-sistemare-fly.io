services:
  - type: web
    name: motostaffa-office
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: motostaffa-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        value: $2a$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi
      - key: RENDER_DISK_PATH
        value: /data
